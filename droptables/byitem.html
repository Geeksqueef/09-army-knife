<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drop Table Tool - Search Item</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>
</head>
<body>
<script src="./js/byitem.js"></script>
<div id="wrapper" class="wrapper">
    <div class="page-header">
        <a href="./"><img src="../images/logo.png" alt="Logo" class="logo"></a>
        <h2>Drop Table Tool</h2>
        <p>To return to the main page click <a href="../index.html">here</a></p>
    </div>
    <input id="search" class="form-control input-lg" placeholder="Item Name"></input>
    <div class="text-center">
        <p>If you'd like to search by NPC/Monster name click <a href="index.html">here</a></p>
        <p>Notes: RDT Slot = Rare Drop Table <a href="rdt.html">(link)</a>, Summoning Charms are rolled separately <input type="checkbox" id="debug-toggle" name="debug"><label>Show ID's</label></p>
    </div>
    <div class="loading" style="display: none;">
        <div class="stage"><h1>Loading JSON</h1></div>
        <div class="stage"><div class="dot-pulse"></div></div>
    </div>
    <div id="content"></div>
    <script>
        var timeoutId = 0;
        $('#search').keydown(function () { 
            console.log("Keydown")
            console.log(($('#search').val()))
            clearTimeout(timeoutId); // doesn't matter if it's 0
            timeoutId = setTimeout(function() { 
                search($('#search').val()) 
            }, 500);
        });
    </script>
</div>
</html>
