<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items Stats Tool - Search Item</title>
    <link rel="stylesheet" href="../theme.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/jquery-3.6.0.min.js"></script>
    <script src="./js/common.js"></script>
</head>
<body>
<script src="./js/itemdata.js"></script>
<div id="wrapper" class="wrapper">
    <div class="page-header">
        <a href="./"><img src="../images/logo.png" alt="Logo" class="logo"></a>
        <h2>Item Stats Tool</h2>
        <p>To return to the main page click <a href="../index.html">here</a></p>
    </div>
    <input class="form-control input-lg" placeholder="Item Name" onkeyup="search(this);"></input>
    <div class="text-center">
        <p>If you'd like to search Drop Tables click <a href="index.html">here</a></p>
        <p><input type="checkbox" id="debug-toggle" name="debug"><label>Show ALL Attributes</label></p>
    </div>
    <div class="loading" style="display: none;">
        <div class="stage"><h1>Loading JSON</h1></div>
        <div class="stage"><div class="dot-pulse"></div></div>
    </div>
    <div id="content"></div>
</div>
</html>
